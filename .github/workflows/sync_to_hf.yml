name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd frontend
          npm install
          VITE_API_URL=/api npm run build

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI"

          # ← underscore here
          git clone https://mlresearcher05:$HF_TOKEN@huggingface.co/spaces/mlresearcher05/paddy_disease_detection hf_space

          find hf_space -mindepth 1 -not -path 'hf_space/.git*' -delete

          cp Dockerfile hf_space/Dockerfile
          cp README.md  hf_space/README.md
          cp -r backend hf_space/backend
          mkdir -p hf_space/frontend
          cp -r frontend/dist hf_space/frontend/dist

          cd hf_space
          git add -A
          git diff --cached --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push
```

Also make sure your **HF Space was created with underscore**:
```
huggingface.co/spaces/mlresearcher05/paddy_disease_detection